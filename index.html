// Calcula avance automático de un proyecto = promedio del progreso de sus tareas
function computeProjectProgress(projectId, tasks) {
  const own = tasks.filter(t => t.project_id === projectId);
  if (own.length === 0) return null;  // null = no hay tareas, usar manual
  return Math.round(own.reduce((a,t) => a + t.progress, 0) / own.length);
}

function isOverdue(d,s){return s!=="Listo"&&d<today;}
function daysUntil(d){return Math.ceil((new Date(d)-new Date(today))/(1000*60*60*24));}

function Badge({label,style}){return <span className={`text-xs font-semibold px-2 py-0.5 rounded-full whitespace-nowrap ${style}`}>{label}</span>;}

// ── Toast de notificación ──────────────────────────────────────
function Toast({msg, type, onDone}) {
  useEffect(() => { const t = setTimeout(onDone, 3500); return () => clearTimeout(t); }, []);
  const bg = type === "ok" ? "#d1fae5" : type === "err" ? "#fee2e2" : "#fefce8";
  const color = type === "ok" ? "#065f46" : type === "err" ? "#991b1b" : "#92400e";
  const icon = type === "ok" ? "✅" : type === "err" ? "❌" : "⏳";
  return (
    <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,background:bg,color,border:`1px solid ${color}33`,borderRadius:12,padding:"12px 20px",fontWeight:700,fontSize:13,boxShadow:"0 4px 16px rgba(0,0,0,0.15)",maxWidth:320}}>
      {icon} {msg}
    </div>
  );
}

function DetailModal({project,onClose,onUpdate}){

  const [newSubtask,setNewSubtask]=useState("");

  function addComment(){if(!newComment.trim())return;onUpdate({...project,comments:[...project.comments,{id:Date.now(),author:"Abel",text:newComment,date:today}]});setNewComment("");}
  function addLink(){if(!newLinkUrl.trim())return;onUpdate({...project,links:[...project.links,{id:Date.now(),label:newLinkLabel||newLinkUrl,url:newLinkUrl}]});setNewLinkLabel("");setNewLinkUrl("");}
  function addSubtask(){if(!newSubtask.trim())return;onUpdate({...project,subtasks:[...project.subtasks,{id:Date.now(),text:newSubtask,done:false}]});setNewSubtask("");}
  function toggleSubtask(id){const subs=project.subtasks.map(s=>s.id===id?{...s,done:!s.done}:s);const done=subs.filter(s=>s.done).length;onUpdate({...project,subtasks:subs,progress:subs.length>0?Math.round((done/subs.length)*100):project.progress});}
  function removeSubtask(id){onUpdate({...project,subtasks:project.subtasks.filter(s=>s.id!==id)});}
  function removeComment(id){onUpdate({...project,comments:project.comments.filter(c=>c.id!==id)});}
  function removeLink(id){onUpdate({...project,links:project.links.filter(l=>l.id!==id)});}

  const iStyle={width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,marginTop:4,boxSizing:"border-box"};
  const tabs=[{k:"info",l:"ℹ️ Info"},{k:"subtasks",l:`✅ (${project.subtasks.length})`},{k:"comments",l:`💬 (${project.comments.length})`},{k:"links",l:`📎 (${project.links.length})`}];

        </div>

              {t.l}

          ))}
        </div>
        <div style={{padding:20}}>
          {tab==="info"&&(
            <div>
              <div style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GREEN_DARK,marginBottom:4}}><span>Avance</span><span style={{fontWeight:700}}>{project.progress}%</span></div>

            <div>
              {project.links.length===0&&<p style={{textAlign:"center",color:"#9ca3af",fontSize:13,padding:"16px 0"}}>No hay links adjuntos</p>}

                  <a href={l.url} target="_blank" rel="noreferrer" style={{fontSize:13,fontWeight:600,color:GREEN_DARK,textDecoration:"none"}}>📎 {l.label}</a>
                  <button onClick={()=>removeLink(l.id)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer"}}>✕</button>
                </div>
              ))}
              <input value={newLinkLabel} onChange={e=>setNewLinkLabel(e.target.value)} placeholder="Etiqueta (ej. Manual de usuario)" style={iStyle}/>
              <input value={newLinkUrl} onChange={e=>setNewLinkUrl(e.target.value)} placeholder="URL (https://...)" style={{...iStyle,marginTop:8}}/>
              <button onClick={addLink} style={{background:GREEN,color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",width:"100%",marginTop:8}}>+ Adjuntar link</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function CalendarView({projects}){
  const [month,setMonth]=useState(new Date(today.slice(0,7)+"-01"));
  const y=month.getFullYear(),m=month.getMonth();
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const cells=Array(firstDay).fill(null).concat(Array.from({length:daysInMonth},(_,i)=>i+1));
  while(cells.length%7!==0)cells.push(null);
  const byDay={};
  projects.forEach(p=>{const d=new Date(p.deadline);if(d.getFullYear()===y&&d.getMonth()===m){const day=d.getDate();if(!byDay[day])byDay[day]=[];byDay[day].push(p);}});
  return(
    <div style={{background:"white",borderRadius:16,overflow:"hidden",border:`1px solid #c6dfc9`}}>
      <div style={{background:GREEN,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px"}}>
        <button onClick={()=>setMonth(new Date(y,m-1,1))} style={{background:"none",border:"none",color:"white",fontSize:20,cursor:"pointer",fontWeight:700}}>‹</button>
        <h3 style={{color:"white",margin:0,fontWeight:700}}>{month.toLocaleDateString("es-MX",{month:"long",year:"numeric"})}</h3>
        <button onClick={()=>setMonth(new Date(y,m+1,1))} style={{background:"none",border:"none",color:"white",fontSize:20,cursor:"pointer",fontWeight:700}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",textAlign:"center",fontSize:12,fontWeight:700,padding:"8px 0",background:GREEN_LIGHT,color:GREEN_DARK}}>
        {["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"].map(d=><div key={d}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"#e2e8f0"}}>
        {cells.map((day,i)=>{
          const isToday=day&&`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`===today;
          const dayP=day?byDay[day]||[]:[];
          return(
            <div key={i} style={{minHeight:64,padding:4,background:day?(isToday?GREEN_LIGHT:"white"):"#f8fafc",fontSize:11}}>
              {day&&<div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:isToday?GREEN:"transparent",color:isToday?"white":GREEN_DARK,fontWeight:700,marginBottom:2}}>{day}</div>}
              {dayP.map(p=><div key={p.id} style={{fontSize:10,borderRadius:4,padding:"1px 4px",marginBottom:2,background:isOverdue(p.deadline,p.status)?"#fee2e2":p.status==="Listo"?"#d1fae5":GREEN_LIGHT,color:isOverdue(p.deadline,p.status)?"#991b1b":GREEN_DARK,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}} title={p.name}>{p.name}</div>)}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ProjectAccordion({p, member}) {
  const [open, setOpen] = useState(false);
  const doneSubs = p.subtasks.filter(s=>s.done).length;
  return (
    <div style={{background:"white",border:`1px solid #c6dfc9`,borderRadius:12,marginBottom:8,overflow:"hidden"}}>
      {/* Cabecera siempre visible */}
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"10px 16px",cursor:"pointer",background:open?GREEN_LIGHT:"white",transition:"background 0.2s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,color:open?GREEN_DARK:"#6b7280",fontWeight:700,transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
            <span style={{fontWeight:700,fontSize:13,color:"#1f2937"}}>{p.name}</span>
            {p.assignees.length>1&&<span style={{fontSize:11,color:GREEN_MID}}>🌿 +{p.assignees.filter(a=>a!==member).join(", ")}</span>}
            {isOverdue(p.deadline,p.status)&&<span style={{fontSize:11,color:"#ef4444",fontWeight:700}}>⚠️ Vencido</span>}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <Badge label={p.category} style={CATEGORY_STYLE[p.category]}/>
            <Badge label={p.priority} style={PRIORITY_STYLE[p.priority]}/>
            <Badge label={p.status} style={STATUS_STYLE[p.status]}/>
            <span style={{fontSize:11,color:"#9ca3af"}}>{p.deadline}</span>
            {/* mini-contadores */}
            {p.subtasks.length>0&&<span style={{fontSize:11,background:"#e0f2fe",color:"#0369a1",borderRadius:10,padding:"1px 7px",fontWeight:700}}>✅ {doneSubs}/{p.subtasks.length}</span>}
            {p.comments.length>0&&<span style={{fontSize:11,background:"#f3e8ff",color:"#7c3aed",borderRadius:10,padding:"1px 7px",fontWeight:700}}>💬 {p.comments.length}</span>}
            {p.links.length>0&&<span style={{fontSize:11,background:"#fef9c3",color:"#854d0e",borderRadius:10,padding:"1px 7px",fontWeight:700}}>📎 {p.links.length}</span>}
          </div>
        </div>
        {/* Barra de progreso siempre visible */}
        <div style={{marginTop:8}}>
          <div style={{background:"#e2e8f0",borderRadius:4,height:5}}>
            <div style={{height:5,borderRadius:4,background:p.progress===100?GREEN_MID:p.progress>=50?"#2563eb":"#f59e0b",width:`${p.progress}%`,transition:"width 0.3s"}}/>
          </div>
          <p style={{textAlign:"right",fontSize:10,color:GREEN_MID,margin:"2px 0 0"}}>{p.progress}% completado</p>
        </div>
      </div>

      {/* Contenido expandible */}
      {open&&(
        <div style={{padding:"12px 16px",borderTop:`1px solid #c6dfc9`,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {/* Notas */}
          {p.notes&&(
            <div style={{gridColumn:"1/-1",background:GREEN_LIGHT,borderRadius:8,padding:"8px 12px"}}>
              <p style={{margin:"0 0 4px",fontSize:11,fontWeight:700,color:GREEN_DARK}}>📝 Notas</p>
              <p style={{margin:0,fontSize:12,color:"#374151"}}>{p.notes}</p>
            </div>
          )}
          {/* Subtareas */}
          {p.subtasks.length>0&&(
            <div>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:GREEN_DARK}}>✅ Subtareas</p>
              {p.subtasks.map(s=>(
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <span style={{fontSize:12}}>{s.done?"✅":"⬜"}</span>
                  <span style={{fontSize:12,color:s.done?"#9ca3af":"#374151",textDecoration:s.done?"line-through":"none"}}>{s.text}</span>
                </div>
              ))}
            </div>
          )}
          {/* Comentarios */}
          {p.comments.length>0&&(
            <div>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:GREEN_DARK}}>💬 Comentarios</p>
              {p.comments.map(c=>(
                <div key={c.id} style={{marginBottom:6,background:"#f8fafc",borderRadius:8,padding:"6px 10px"}}>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                    <Avatar name={c.author} size={16}/>
                    <span style={{fontSize:11,fontWeight:700,color:GREEN_DARK}}>{c.author}</span>
                    <span style={{fontSize:10,color:"#9ca3af"}}>{c.date}</span>
                  </div>
                  <p style={{margin:0,fontSize:12,color:"#374151",paddingLeft:22}}>{c.text}</p>
                </div>
              ))}
            </div>
          )}
          {/* Links */}
          {p.links.length>0&&(
            <div style={{gridColumn: p.subtasks.length>0&&p.comments.length>0?"1/-1":"auto"}}>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:GREEN_DARK}}>📎 Links</p>
              {p.links.map(l=>(
                <a key={l.id} href={l.url} target="_blank" rel="noreferrer" style={{display:"block",fontSize:12,color:GREEN,fontWeight:600,marginBottom:4,textDecoration:"none"}}>↗ {l.label}</a>
              ))}
            </div>
          )}
          {/* Si no hay nada extra */}
          {!p.notes&&p.subtasks.length===0&&p.comments.length===0&&p.links.length===0&&(
            <p style={{gridColumn:"1/-1",fontSize:12,color:"#9ca3af",textAlign:"center",margin:0}}>Sin detalles adicionales</p>
          )}
        </div>
      )}
    </div>
  );
}

// ── Vista de lista de proyectos ────────────────────────────────
function ProjectsList({itProjects, projects, onSelect, onNew, onEdit, onDelete}) {
  const phases = [...new Set(itProjects.map(p => p.phase).filter(Boolean))].sort();
  const [filterPhase, setFilterPhase] = useState("Todas");
  const [filterStatus, setFilterStatus] = useState("Todos");

  const filtered = itProjects.filter(p =>
    (filterPhase === "Todas" || p.phase === filterPhase) &&
    (filterStatus === "Todos" || p.status === filterStatus)
  );

  function effectiveProgress(p) {
    if (p.auto_progress) {
      const auto = computeProjectProgress(p.id, projects);
      if (auto !== null) return auto;
    }
    return p.progress;
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:12}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <select value={filterPhase} onChange={e=>setFilterPhase(e.target.value)} style={{fontSize:12,border:"1px solid #c6dfc9",borderRadius:8,padding:"6px 10px",background:"white"}}>
            <option>Todas</option>
            {phases.map(ph=><option key={ph}>{ph}</option>)}
          </select>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{fontSize:12,border:"1px solid #c6dfc9",borderRadius:8,padding:"6px 10px",background:"white"}}>
            <option>Todos</option>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <button onClick={onNew} style={{background:GREEN,color:"white",border:"none",borderRadius:8,padding:"8px 18px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Nuevo proyecto</button>
      </div>

      {filtered.length===0 && (
        <div style={{background:"white",borderRadius:16,padding:48,textAlign:"center",border:`1px dashed #c6dfc9`}}>
          <p style={{fontSize:42,margin:0}}>📁</p>
          <p style={{color:"#6b7280",fontSize:14,margin:"8px 0 4px"}}>No hay proyectos aún</p>
          <p style={{color:"#9ca3af",fontSize:12,margin:0}}>Crea tu primer proyecto para agrupar tareas</p>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
        {filtered.map(p => {
          const progress = effectiveProgress(p);
          const taskCount = projects.filter(t => t.project_id === p.id).length;
          const doneTasks = projects.filter(t => t.project_id === p.id && t.status === "Listo").length;
          return (
            <div key={p.id} style={{background:"white",borderRadius:12,border:`1px solid #c6dfc9`,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",transition:"transform 0.15s, box-shadow 0.15s",cursor:"pointer"}}
                 onClick={()=>onSelect(p)}
                 onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.1)"}}
                 onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{background:GREEN_DARK,padding:"10px 14px",color:"white"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <h3 style={{margin:0,fontSize:14,fontWeight:800,flex:1}}>{p.name}</h3>
                  <Badge label={p.status} style={STATUS_STYLE[p.status]}/>
                </div>
                {p.phase && <p style={{margin:"4px 0 0",fontSize:11,color:"#a8d5b5",fontWeight:600}}>📌 {p.phase}</p>}
              </div>
              <div style={{padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <Avatar name={p.owner} size={24}/>
                  <span style={{fontSize:12,fontWeight:600,color:GREEN_DARK}}>{p.owner}</span>
                  <span style={{fontSize:11,color:"#9ca3af",marginLeft:"auto"}}>
                    {taskCount>0 ? `${doneTasks}/${taskCount} tareas` : "Sin tareas"}
                  </span>
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:GREEN_DARK,marginBottom:2}}>
                    <span>Avance {p.auto_progress && taskCount>0 && <span style={{color:"#9ca3af"}}>(auto)</span>}</span>
                    <span style={{fontWeight:700}}>{progress}%</span>
                  </div>
                  <div style={{background:"#e2e8f0",borderRadius:4,height:6}}>
                    <div style={{height:6,borderRadius:4,background:progress===100?GREEN_MID:progress>=50?"#2563eb":"#f59e0b",width:`${progress}%`,transition:"width 0.3s"}}/>
                  </div>
                </div>
                {p.description && <p style={{margin:"8px 0 0",fontSize:12,color:"#6b7280",lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{p.description}</p>}
                <div style={{display:"flex",gap:8,marginTop:10,borderTop:`1px solid ${GREEN_LIGHT}`,paddingTop:8}}>
                  <button onClick={e=>{e.stopPropagation();onEdit(p)}} style={{background:"none",border:"none",color:"#3b82f6",fontSize:12,fontWeight:600,cursor:"pointer",padding:0}}>Editar</button>
                  <button onClick={e=>{e.stopPropagation();if(window.confirm("¿Eliminar este proyecto? Las tareas asociadas quedarán sin proyecto."))onDelete(p.id)}} style={{background:"none",border:"none",color:"#f87171",fontSize:12,fontWeight:600,cursor:"pointer",padding:0}}>Eliminar</button>
                  <span style={{marginLeft:"auto",fontSize:11,color:GREEN,fontWeight:600}}>Ver dashboard →</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Dashboard individual de un proyecto ────────────────────────
function ProjectDashboard({itProject, projects, onBack, onEdit, setDetailProject, cycleStatus}) {
  const tasks = projects.filter(t => t.project_id === itProject.id);
  const taskStats = {
    total: tasks.length,
    pendiente: tasks.filter(t => t.status === "Pendiente").length,
    progreso: tasks.filter(t => t.status === "En progreso").length,
    listo: tasks.filter(t => t.status === "Listo").length,
    vencidos: tasks.filter(t => isOverdue(t.deadline, t.status)).length,
  };
  const autoProgress = computeProjectProgress(itProject.id, projects);
  const progress = (itProject.auto_progress && autoProgress !== null) ? autoProgress : itProject.progress;

  const loadByPerson = TEAM.map(m => ({
    name: m,
    count: tasks.filter(t => t.assignees.includes(m)).length
  })).filter(x => x.count > 0);

  return (
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:GREEN,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:12,padding:0}}>← Volver a proyectos</button>

      <div style={{background:"white",borderRadius:16,overflow:"hidden",border:`1px solid #c6dfc9`,marginBottom:16}}>
        <div style={{background:GREEN_DARK,padding:"16px 20px",color:"white"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
            <div>
              <p style={{margin:0,fontSize:10,fontWeight:700,letterSpacing:2,color:"#7cc47a",textTransform:"uppercase"}}>Proyecto IT</p>
              <h2 style={{margin:"4px 0",fontSize:22,fontWeight:800}}>{itProject.name}</h2>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6,alignItems:"center"}}>
                <Badge label={itProject.status} style={STATUS_STYLE[itProject.status]}/>
                {itProject.phase && <span style={{fontSize:11,background:"rgba(255,255,255,0.15)",padding:"2px 10px",borderRadius:20,fontWeight:600}}>📌 {itProject.phase}</span>}
                <span style={{fontSize:11,display:"flex",alignItems:"center",gap:4}}><Avatar name={itProject.owner} size={18}/> {itProject.owner}</span>
              </div>
            </div>
            <button onClick={()=>onEdit(itProject)} style={{background:"rgba(255,255,255,0.15)",color:"white",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✏️ Editar proyecto</button>
          </div>
        </div>
        <div style={{padding:"16px 20px"}}>
          {itProject.description && <p style={{margin:"0 0 14px",color:"#374151",fontSize:13,lineHeight:1.5}}>{itProject.description}</p>}
          <div style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GREEN_DARK,marginBottom:4}}>
              <span style={{fontWeight:700}}>Avance del proyecto {itProject.auto_progress && autoProgress!==null && <span style={{color:"#9ca3af",fontWeight:400}}>(promedio de tareas)</span>}</span>
              <span style={{fontWeight:800,fontSize:14}}>{progress}%</span>
            </div>
            <div style={{background:"#e2e8f0",borderRadius:6,height:10}}>
              <div style={{height:10,borderRadius:6,background:progress===100?GREEN_MID:progress>=50?"#2563eb":"#f59e0b",width:`${progress}%`,transition:"width 0.3s"}}/>
            </div>
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:16}}>
        {[
          {l:"Tareas",v:taskStats.total,bg:GREEN_DARK},
          {l:"Pendientes",v:taskStats.pendiente,bg:"#64748b"},
          {l:"En progreso",v:taskStats.progreso,bg:"#2563eb"},
          {l:"Completadas",v:taskStats.listo,bg:GREEN_MID},
          {l:"Vencidas",v:taskStats.vencidos,bg:taskStats.vencidos>0?"#dc2626":"#9ca3af"},
        ].map(c=>(
          <div key={c.l} style={{background:c.bg,color:"white",borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:800}}>{c.v}</div>
            <div style={{fontSize:11,opacity:.85,marginTop:2}}>{c.l}</div>
          </div>
        ))}
      </div>

      {loadByPerson.length>0 && (
        <div style={{background:"white",borderRadius:12,border:`1px solid #c6dfc9`,padding:"14px 18px",marginBottom:16}}>
          <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:GREEN_DARK}}>👥 Carga por persona</h3>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            {loadByPerson.map(x=>(
              <div key={x.name} style={{display:"flex",alignItems:"center",gap:6,background:GREEN_LIGHT,borderRadius:20,padding:"4px 12px"}}>
                <Avatar name={x.name} size={20}/>
                <span style={{fontSize:12,fontWeight:700,color:GREEN_DARK}}>{x.name}</span>
                <span style={{fontSize:11,background:"white",borderRadius:10,padding:"0 7px",fontWeight:700,color:GREEN_MID}}>{x.count}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{background:"white",borderRadius:12,border:`1px solid #c6dfc9`,overflow:"hidden"}}>
        <div style={{background:GREEN,color:"white",padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h3 style={{margin:0,fontSize:13,fontWeight:700}}>📋 Tareas del proyecto ({tasks.length})</h3>
        </div>
        {tasks.length===0 ? (
          <div style={{padding:32,textAlign:"center",color:"#9ca3af",fontSize:13}}>
            No hay tareas asignadas. Crea una tarea y asígnala a este proyecto.
          </div>
        ) : (
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <tbody>
              {tasks.map((t,i)=>(
                <tr key={t.id} style={{background:i%2===0?"white":"#f4fbf6",borderBottom:"1px solid #e8f5ee"}}>
                  <td style={{padding:"10px 16px",width:"40%"}}>
                    <div style={{fontWeight:600,color:"#1f2937",cursor:"pointer"}} onClick={()=>setDetailProject(t)}>{t.name}</div>
                    {isOverdue(t.deadline,t.status)&&<span style={{fontSize:11,color:"#ef4444",fontWeight:700}}>⚠️ Vencido</span>}
                  </td>
                  <td style={{padding:"10px 16px"}}><AvatarGroup assignees={t.assignees}/></td>
                  <td style={{padding:"10px 16px"}}>
                    <button onClick={()=>cycleStatus(t.id)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}>
                      <Badge label={t.status} style={STATUS_STYLE[t.status]}/>
                    </button>
                  </td>
                  <td style={{padding:"10px 16px"}}>
                    <div style={{width:80}}>
                      <div style={{fontSize:11,color:GREEN_DARK,marginBottom:2,fontWeight:600}}>{t.progress}%</div>
                      <div style={{background:"#e2e8f0",borderRadius:4,height:6}}>
                        <div style={{height:6,borderRadius:4,background:t.progress===100?GREEN_MID:t.progress>=50?"#2563eb":"#f59e0b",width:`${t.progress}%`}}/>
                      </div>
                    </div>
                  </td>
                  <td style={{padding:"10px 16px",color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{t.deadline}</td>
                  <td style={{padding:"10px 16px"}}>
                    <button onClick={()=>setDetailProject(t)} style={{background:"none",border:"none",color:GREEN,fontSize:12,fontWeight:600,cursor:"pointer"}}>Ver</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ── Modal de formulario de proyecto ────────────────────────────
function ProjectFormModal({form, setForm, onSave, onClose, saving, editMode, existingPhases}) {
  const S = {
    input:{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,marginTop:4,boxSizing:"border-box"},
    select:{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,marginTop:4}
  };
  return (
    <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.55)"}}>
      <div style={{background:"white",borderRadius:16,width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto",border:`2px solid #c6dfc9`}}>
        <div style={{background:GREEN_DARK,padding:"14px 20px",borderRadius:"14px 14px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h3 style={{margin:0,color:"white",fontSize:16,fontWeight:800}}>{editMode?"✏️ Editar proyecto":"📁 Nuevo proyecto"}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:"white",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:20}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{gridColumn:"1/-1"}}>
              <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Nombre *</label>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={{...S.input,border:form.name.trim()?"1px solid #e5e7eb":"1px solid #fca5a5"}} placeholder="Ej. Modernización de red" autoFocus/>
            </div>
            <div>
              <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Responsable</label>
              <select value={form.owner} onChange={e=>setForm(f=>({...f,owner:e.target.value}))} style={S.select}>
                {TEAM.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Estado</label>
              <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={S.select}>
                {STATUSES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Fase</label>
              <input value={form.phase} onChange={e=>setForm(f=>({...f,phase:e.target.value}))} style={S.input} placeholder="Ej. Fase 1 - Infraestructura" list="phase-suggestions"/>
              {existingPhases.length>0 && <datalist id="phase-suggestions">{existingPhases.map(p=><option key={p} value={p}/>)}</datalist>}
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Descripción</label>
              <textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} style={{...S.input,minHeight:60,resize:"vertical",fontFamily:"inherit"}} placeholder="Opcional"/>
            </div>
            <div style={{gridColumn:"1/-1",background:GREEN_LIGHT,borderRadius:10,padding:"10px 14px"}}>
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                <input type="checkbox" checked={form.auto_progress} onChange={e=>setForm(f=>({...f,auto_progress:e.target.checked}))} style={{width:16,height:16,accentColor:GREEN,cursor:"pointer"}}/>
                <span style={{fontSize:12,fontWeight:700,color:GREEN_DARK}}>Calcular avance automáticamente desde tareas</span>
              </label>
              <p style={{margin:"6px 0 0 24px",fontSize:11,color:"#6b7280"}}>Si está desactivado o no hay tareas, usa el slider manual.</p>
            </div>
            {!form.auto_progress && (
              <div style={{gridColumn:"1/-1"}}>
                <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Avance manual: {form.progress}%</label>
                <input type="range" min={0} max={100} value={form.progress} onChange={e=>setForm(f=>({...f,progress:+e.target.value}))} style={{width:"100%",marginTop:6,accentColor:GREEN}}/>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:8,marginTop:16,alignItems:"center"}}>
            <button onClick={onSave} disabled={saving} style={{background:saving?"#9ca3af":GREEN,color:"white",border:"none",borderRadius:8,padding:"9px 24px",fontSize:13,fontWeight:700,cursor:saving?"not-allowed":"pointer",minWidth:140}}>
              {saving?"⏳ Guardando...":editMode?"Guardar cambios":"Crear proyecto"}
            </button>
            <button onClick={onClose} style={{background:"white",color:"#6b7280",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 16px",fontSize:13,cursor:"pointer"}}>Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

          {catStats.map(x=><span key={x.cat} className={CATEGORY_STYLE[x.cat]} style={{fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:20}}>{x.cat} <span style={{background:"rgba(255,255,255,0.6)",borderRadius:10,padding:"0 5px"}}>{x.count}</span></span>)}
        </div>
      </div>
      {stats.vencidos>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:12,padding:"10px 16px",marginBottom:16,color:"#991b1b",fontSize:13}}>⚠️ Hay <b>{stats.vencidos}</b> tarea(s) con fecha vencida.</div>}
      {/* Por miembro */}
      {TEAM.map(member=>{
        const tasks=projects.filter(p=>p.assignees.includes(member));
        if(!tasks.length)return null;
        return(
          <div key={member} style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:6,borderBottom:`2px solid ${GREEN_LIGHT}`}}>
              <Avatar name={member} size={28}/>
              <h3 style={{margin:0,color:GREEN_DARK,fontSize:15,fontWeight:800}}>{member}</h3>
              <span style={{fontSize:12,color:"#9ca3af"}}>({tasks.length} tarea{tasks.length>1?"s":""})</span>
            </div>
            {tasks.map(p=><ProjectAccordion key={p.id} p={p} member={member}/>)}
          </div>
        );
      })}
      <div style={{borderTop:`1px solid #c6dfc9`,paddingTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><Logo size={20}/><span style={{fontSize:11,color:"#9ca3af"}}>Generado automáticamente · Dashboard IT · Parque Tempisque</span></div>
        <button onClick={printReport} style={{background:GREEN,color:"white",border:"none",borderRadius:8,padding:"7px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>📤 Exportar PDF</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// APP PRINCIPAL
// ══════════════════════════════════════════════════════════════
function App(){
  const [projects, setProjects] = useState([]);
  const [itProjects, setITProjects] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);          // ← flag único de guardado
  const [toast, setToast] = useState(null);             // ← {msg, type}
  const [form, setForm] = useState(EMPTY);
  const [editId, setEditId] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [projectForm, setProjectForm] = useState(EMPTY_PROJECT);
  const [editProjectId, setEditProjectId] = useState(null);
  const [showProjectForm, setShowProjectForm] = useState(false);
  const [selectedProject, setSelectedProject] = useState(null);
  const [filterStatus, setFilterStatus] = useState("Todos");
  const [filterAssignee, setFilterAssignee] = useState("Todos");
  const [filterCategory, setFilterCategory] = useState("Todas");
  const [filterProject, setFilterProject] = useState("Todos");
  const [view, setView] = useState("proyectos");
  const [detailProject, setDetailProject] = useState(null);
  const [alertDays, setAlertDays] = useState(3);
  const [dbError, setDbError] = useState(null);

  function showToast(msg, type="ok") { setToast({msg, type}); }

  // ── CARGAR desde Supabase ──────────────────────────────────
  useEffect(() => {
    async function fetchAll() {
      setLoading(true);
      const [{ data: tData, error: tErr }, { data: pData, error: pErr }] = await Promise.all([
        sb.from("projects").select("*").order("id", { ascending: true }),
        sb.from("it_projects").select("*").order("id", { ascending: true }),
      ]);
      if (tErr) {
        console.error("Error cargando tareas:", tErr);
        setDbError("No se pudo conectar a la base de datos: " + tErr.message);
      } else {
        setProjects(tData.map(rowToProject));
      }
      if (pErr) {
        console.error("Error cargando proyectos IT:", pErr);
        // Solo muestra aviso si el error NO es "tabla inexistente"
        if (!pErr.message?.includes("does not exist")) {
          setDbError(d => d || ("Error cargando proyectos: " + pErr.message));
        }
      } else {
        setITProjects(pData.map(rowToITProject));
      }
      setLoading(false);
    }
    fetchAll();
  }, []);

  // ── GUARDAR (upsert) en Supabase ───────────────────────────
  async function persistProject(project) {
    const row = { id: project.id, ...projectToRow(project) };
    const { error } = await sb.from("projects").upsert(row, { onConflict: "id" });
    if (error) { console.error("persistProject error:", error); showToast("Error al guardar: " + error.message, "err"); return false; }
    return true;
  }

  // ── CREAR / EDITAR proyecto ────────────────────────────────
  async function saveProject() {
    if (!form.name.trim()) {
      showToast("El nombre de la tarea es obligatorio", "warn");
      return;
    }
    if (saving) return;   // evitar doble-click
    setSaving(true);

    try {
      if (editId !== null) {
        // UPDATE
        const updated = { ...form, id: editId };
        const { error } = await sb.from("projects").update(projectToRow(updated)).eq("id", editId);
        if (error) throw error;
        setProjects(ps => ps.map(p => p.id === editId ? updated : p));
        if (detailProject?.id === editId) setDetailProject(updated);
        setEditId(null);
        showToast("Tarea actualizada correctamente");
      } else {
        // INSERT — generamos id numérico en cliente (timestamp ms)
        const newId = Date.now();
        const payload = { id: newId, ...projectToRow(form) };
        console.log("Insertando:", payload);
        const { data, error } = await sb.from("projects").insert(payload).select().single();
        if (error) throw error;
        const newProject = rowToProject(data);
        setProjects(ps => [...ps, newProject]);
        showToast("Tarea creada correctamente ✅");
      }
      setForm(EMPTY);
      setShowForm(false);
    } catch (err) {
      console.error("saveProject error:", err);
      showToast("Error al guardar: " + (err.message || JSON.stringify(err)), "err");
    } finally {
      setSaving(false);
    }
  }

  // ── ELIMINAR proyecto ──────────────────────────────────────
  async function deleteProject(id) {
    const { error } = await sb.from("projects").delete().eq("id", id);
    if (error) { showToast("Error al eliminar: " + error.message, "err"); return; }
    setProjects(ps => ps.filter(p => p.id !== id));
    if (detailProject?.id === id) setDetailProject(null);
    showToast("Tarea eliminada");
  }

  // ── ACTUALIZAR proyecto (desde DetailModal y cycleStatus) ──
  async function updateProject(updated) {
    setProjects(ps => ps.map(p => p.id === updated.id ? updated : p));
    setDetailProject(updated);
    const ok = await persistProject(updated);
    if (ok) showToast("Guardado en Supabase ✅");
  }

  async function cycleStatus(id) {
    const p = projects.find(x => x.id === id);
    if (!p) return;
    const updated = { ...p, status: STATUSES[(STATUSES.indexOf(p.status) + 1) % STATUSES.length] };
    await updateProject(updated);
  }

  // ── CRUD de PROYECTOS IT ───────────────────────────────────
  async function saveITProject() {
    if (!projectForm.name.trim()) {
      showToast("El nombre del proyecto es obligatorio", "warn");
      return;
    }
    if (saving) return;
    setSaving(true);
    try {
      if (editProjectId !== null) {
        const updated = { ...projectForm, id: editProjectId };
        const { error } = await sb.from("it_projects").update(itProjectToRow(updated)).eq("id", editProjectId);
        if (error) throw error;
        setITProjects(ps => ps.map(p => p.id === editProjectId ? updated : p));
        if (selectedProject?.id === editProjectId) setSelectedProject(updated);
        setEditProjectId(null);
        showToast("Proyecto actualizado correctamente");
      } else {
        const newId = Date.now();
        const payload = { id: newId, ...itProjectToRow(projectForm) };
        const { data, error } = await sb.from("it_projects").insert(payload).select().single();
        if (error) throw error;
        const newP = rowToITProject(data);
        setITProjects(ps => [...ps, newP]);
        showToast("Proyecto creado correctamente ✅");
      }
      setProjectForm(EMPTY_PROJECT);
      setShowProjectForm(false);
    } catch (err) {
      console.error("saveITProject error:", err);
      showToast("Error al guardar: " + (err.message || JSON.stringify(err)), "err");
    } finally {
      setSaving(false);
    }
  }

  async function deleteITProject(id) {
    const { error } = await sb.from("it_projects").delete().eq("id", id);
    if (error) { showToast("Error al eliminar: " + error.message, "err"); return; }
    setITProjects(ps => ps.filter(p => p.id !== id));
    // Desvincular tareas en el estado local (la FK ya se encarga en DB con ON DELETE SET NULL)
    setProjects(ps => ps.map(t => t.project_id === id ? { ...t, project_id: null } : t));
    if (selectedProject?.id === id) setSelectedProject(null);
    showToast("Proyecto eliminado");
  }

  function startEditITProject(p) {
    setProjectForm({ ...p });
    setEditProjectId(p.id);
    setShowProjectForm(true);
  }

  function startEdit(p) { setForm({...p}); setEditId(p.id); setShowForm(true); }
  function toggleAssignee(name){setForm(f=>{const has=f.assignees.includes(name);if(has&&f.assignees.length===1)return f;return{...f,assignees:has?f.assignees.filter(a=>a!==name):[...f.assignees,name]};});}
  function toggleAll(){setForm(f=>f.assignees.length===TEAM.length?{...f,assignees:[TEAM[0]]}:{...f,assignees:[...TEAM]});}

  const stats = useMemo(() => ({
    total: projects.length,
    pendiente: projects.filter(p => p.status === "Pendiente").length,
    progreso: projects.filter(p => p.status === "En progreso").length,
    listo: projects.filter(p => p.status === "Listo").length,
    vencidos: projects.filter(p => isOverdue(p.deadline, p.status)).length,
    avgProgress: projects.length ? Math.round(projects.reduce((a,p) => a + p.progress, 0) / projects.length) : 0,
  }), [projects]);

  const alerts = useMemo(() => projects.filter(p => p.status !== "Listo" && !isOverdue(p.deadline, p.status) && daysUntil(p.deadline) <= alertDays), [projects, alertDays]);
  const catStats = useMemo(() => CATEGORIES.map(c => ({cat:c, count:projects.filter(p=>p.category===c).length})).filter(x=>x.count>0), [projects]);
  const filtered = useMemo(() => projects.filter(p =>
    (filterStatus === "Todos" || p.status === filterStatus) &&
    (filterAssignee === "Todos" || p.assignees.includes(filterAssignee)) &&
    (filterCategory === "Todas" || p.category === filterCategory) &&
    (filterProject === "Todos" || (filterProject === "__none__" ? !p.project_id : p.project_id === +filterProject))
  ), [projects, filterStatus, filterAssignee, filterCategory, filterProject]);

  function printReport(){
    const w=window.open("","_blank");
    const rows=projects.map(p=>`<tr><td>${p.name}</td><td>${p.assignees.join(", ")}</td><td>${p.category}</td><td>${p.priority}</td><td>${p.status}</td><td>${p.progress}%</td><td>${p.deadline}</td></tr>`).join("");
    w.document.write(`<html><head><title>Reporte IT – Parque Tempisque</title><style>body{font-family:sans-serif;padding:24px}h1{color:#134522}table{width:100%;border-collapse:collapse;margin-top:16px}th{background:#134522;color:white;padding:8px;text-align:left}td{padding:8px;border-bottom:1px solid #e2e8f0}tr:nth-child(even){background:#f4fbf6}</style></head><body><h1>📊 Reporte Departamento IT</h1><h3 style="color:#2d7a45;margin-top:0">Parque Tempisque</h3><p>${new Date().toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p><p><b>Total:</b> ${stats.total} &nbsp;|&nbsp; <b>Completados:</b> ${stats.listo} &nbsp;|&nbsp; <b>En progreso:</b> ${stats.progreso} &nbsp;|&nbsp; <b>Pendientes:</b> ${stats.pendiente} &nbsp;|&nbsp; <b>Avance promedio:</b> ${stats.avgProgress}%</p><table><thead><tr><th>Proyecto</th><th>Participantes</th><th>Categoría</th><th>Prioridad</th><th>Estado</th><th>Avance</th><th>Deadline</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
    w.document.close(); w.print();
  }

  const S = {
    input:{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,marginTop:4,boxSizing:"border-box"},
    select:{width:"100%",border:"1px solid #e5e7eb",borderRadius:8,padding:"8px 12px",fontSize:13,marginTop:4}
  };
  const VIEWS = [{k:"tabla",l:"📋 Tareas"},{k:"proyectos",l:"📁 Proyectos"},{k:"calendario",l:"📅 Calendario"},{k:"resumen",l:"📊 Resumen Jefe"}];

  if (loading) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,background:GREEN_LIGHT}}>
      <Logo size={64}/>
      <p style={{color:GREEN_DARK,fontWeight:700,fontSize:15}}>Conectando con Supabase...</p>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:GREEN_LIGHT,fontFamily:"sans-serif"}}>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      {detailProject && <DetailModal project={detailProject} onClose={()=>setDetailProject(null)} onUpdate={updateProject}/>}
      {showProjectForm && <ProjectFormModal form={projectForm} setForm={setProjectForm} onSave={saveITProject} onClose={()=>{setShowProjectForm(false);setEditProjectId(null);setProjectForm(EMPTY_PROJECT);}} saving={saving} editMode={editProjectId!==null} existingPhases={[...new Set(itProjects.map(p=>p.phase).filter(Boolean))]}/>}

      {/* HEADER */}
      <div style={{background:GREEN_DARK,padding:"12px 24px"}}>
        <div style={{maxWidth:1000,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <Logo size={92}/>
            <div>
              <p style={{margin:0,fontSize:10,fontWeight:800,letterSpacing:3,color:"#7cc47a",textTransform:"uppercase"}}>Parque Tempisque</p>
              <h1 style={{margin:0,fontSize:20,fontWeight:800,color:"white"}}>Dashboard IT</h1>
              <p style={{margin:0,fontSize:11,color:"#a8d5b5"}}>Control de proyectos y tareas</p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{fontSize:11,padding:"4px 12px",borderRadius:20,fontWeight:600,background:"rgba(255,255,255,0.1)",color:"#a8d5b5"}}>☁️ Supabase</div>
            <button onClick={printReport} style={{background:"rgba(255,255,255,0.15)",color:"white",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📤 Exportar PDF</button>
            <div style={{display:"flex",gap:4}}>
              {VIEWS.map(v=><button key={v.k} onClick={()=>setView(v.k)} style={{background:view===v.k?"white":"rgba(255,255,255,0.12)",color:view===v.k?GREEN_DARK:"white",border:"none",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{v.l}</button>)}
            </div>
          </div>
        </div>
      </div>
      <div style={{height:4,background:`linear-gradient(90deg,${GREEN_MID},#7cc47a,${GREEN_MID})`}}/>

      <div style={{maxWidth:1000,margin:"0 auto",padding:"20px 16px"}}>

        {dbError && <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:12,padding:"12px 16px",marginBottom:16,color:"#991b1b",fontSize:13}}>❌ {dbError}</div>}

        {!(view==="proyectos" && selectedProject) && <>
        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:16}}>
          {[{l:"Total",v:stats.total,bg:GREEN_DARK},{l:"Pendientes",v:stats.pendiente,bg:"#64748b"},{l:"En progreso",v:stats.progreso,bg:"#2563eb"},{l:"Listos",v:stats.listo,bg:GREEN_MID},{l:"Avance prom.",v:`${stats.avgProgress}%`,bg:"#7c3aed"}].map(c=>(
            <div key={c.l} style={{background:c.bg,color:"white",borderRadius:12,padding:"12px 8px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.12)"}}>
              <div style={{fontSize:26,fontWeight:800}}>{c.v}</div>
              <div style={{fontSize:11,opacity:.85,marginTop:2}}>{c.l}</div>
            </div>
          ))}
        </div>

        {/* Alertas */}
        {alerts.length>0&&(
          <div style={{background:"#fefce8",border:"1px solid #fbbf24",borderRadius:12,padding:"10px 16px",marginBottom:12}}>
            <p style={{margin:"0 0 4px",fontSize:12,fontWeight:700,color:"#92400e"}}>🔔 Vencen en los próximos <select value={alertDays} onChange={e=>setAlertDays(+e.target.value)} style={{border:"1px solid #fbbf24",borderRadius:4,padding:"1px 4px",fontSize:12,margin:"0 4px"}}>{[1,2,3,5,7].map(d=><option key={d} value={d}>{d} días</option>)}</select></p>
            {alerts.map(p=><p key={p.id} style={{margin:"2px 0 0 8px",fontSize:12,color:"#b45309"}}>• <b>{p.name}</b> — {p.deadline} ({daysUntil(p.deadline)}d restantes)</p>)}
          </div>
        )}
        {stats.vencidos>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:12,padding:"10px 16px",marginBottom:12,color:"#991b1b",fontSize:13}}>⚠️ <b>{stats.vencidos}</b> tarea(s) con deadline vencido</div>}

        {/* Categorías — solo útil en vista tabla */}
        {view==="tabla" && catStats.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:12,fontWeight:700,color:GREEN_DARK}}>Categorías:</span>
            {catStats.map(x=>(
              <button key={x.cat} onClick={()=>setFilterCategory(filterCategory===x.cat?"Todas":x.cat)}
                className={`${CATEGORY_STYLE[x.cat]}`}
                style={{fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:20,cursor:"pointer",outline:filterCategory===x.cat?`2px solid ${GREEN}`:"none",outlineOffset:2}}>
                {x.cat} <span style={{background:"rgba(255,255,255,0.6)",borderRadius:10,padding:"0 5px"}}>{x.count}</span>
              </button>
            ))}
            {filterCategory!=="Todas"&&<button onClick={()=>setFilterCategory("Todas")} style={{fontSize:12,color:GREEN,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>limpiar</button>}
          </div>
        )}
        </>}

        {/* ── TABLA ── */}
        {view==="tabla"&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:12}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[{v:filterStatus,s:setFilterStatus,o:["Todos",...STATUSES]},{v:filterAssignee,s:setFilterAssignee,o:["Todos",...TEAM]},{v:filterCategory,s:setFilterCategory,o:["Todas",...CATEGORIES]}].map((f,i)=>(
                  <select key={i} value={f.v} onChange={e=>f.s(e.target.value)} style={{fontSize:12,border:"1px solid #c6dfc9",borderRadius:8,padding:"6px 10px",background:"white"}}>
                    {f.o.map(o=><option key={o}>{o}</option>)}
                  </select>
                ))}
                <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} style={{fontSize:12,border:"1px solid #c6dfc9",borderRadius:8,padding:"6px 10px",background:"white"}}>
                  <option value="Todos">Todos los proyectos</option>
                  <option value="__none__">Sin proyecto</option>
                  {itProjects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
              <button onClick={()=>{setForm(EMPTY);setEditId(null);setShowForm(true);}} style={{background:GREEN,color:"white",border:"none",borderRadius:8,padding:"8px 18px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Nueva tarea</button>
            </div>

            {showForm&&(
              <div style={{background:"white",border:`1px solid #c6dfc9`,borderRadius:16,padding:20,marginBottom:16}}>
                <h3 style={{margin:"0 0 14px",color:GREEN_DARK}}>{editId?"✏️ Editar tarea":"➕ Nueva tarea"}</h3>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div style={{gridColumn:"1/-1"}}>
                    <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Nombre *</label>
                    <input
                      value={form.name}
                      onChange={e=>setForm(f=>({...f,name:e.target.value}))}
                      onKeyDown={e=>e.key==="Enter"&&saveProject()}
                      style={{...S.input, border: form.name.trim()?"1px solid #e5e7eb":"1px solid #fca5a5"}}
                      placeholder="Ej. Instalación antivirus"
                      autoFocus
                    />
                    {!form.name.trim()&&<p style={{margin:"4px 0 0",fontSize:11,color:"#ef4444"}}>Campo obligatorio</p>}
                  </div>
                  <div style={{gridColumn:"1/-1"}}>
                    <label style={{fontSize:11,color:"#6b7280",fontWeight:600,display:"block",marginBottom:8}}>Participantes</label>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <button onClick={toggleAll} style={{background:form.assignees.length===TEAM.length?GREEN:GREEN_LIGHT,color:form.assignees.length===TEAM.length?"white":GREEN_DARK,border:`1px solid #a8d5b5`,borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>🌿 Todo el equipo</button>
                      {TEAM.map(name=>{const sel=form.assignees.includes(name);return<button key={name} onClick={()=>toggleAssignee(name)} style={{background:sel?GREEN:"white",color:sel?"white":GREEN_DARK,border:`1px solid ${sel?GREEN:"#c6dfc9"}`,borderRadius:20,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><Avatar name={name} size={16}/>{name}</button>;})}
                    </div>
                  </div>
                  {[{l:"Categoría",k:"category",o:CATEGORIES},{l:"Prioridad",k:"priority",o:PRIORITIES},{l:"Estado",k:"status",o:STATUSES}].map(f=>(
                    <div key={f.k}><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>{f.l}</label><select value={form[f.k]} onChange={e=>setForm(ff=>({...ff,[f.k]:e.target.value}))} style={S.select}>{f.o.map(o=><option key={o}>{o}</option>)}</select></div>
                  ))}
                  <div><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Deadline</label><input type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))} style={S.input}/></div>
                  <div style={{gridColumn:"1/-1"}}>
                    <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>📁 Proyecto <span style={{color:"#9ca3af",fontWeight:400}}>(opcional)</span></label>
                    <select value={form.project_id||""} onChange={e=>setForm(f=>({...f,project_id:e.target.value?+e.target.value:null}))} style={S.select}>
                      <option value="">— Sin proyecto —</option>
                      {itProjects.map(p=><option key={p.id} value={p.id}>{p.name}{p.phase?` · ${p.phase}`:""}</option>)}
                    </select>
                  </div>
                  <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Avance: {form.progress}%</label><input type="range" min={0} max={100} value={form.progress} onChange={e=>setForm(f=>({...f,progress:+e.target.value}))} style={{width:"100%",marginTop:6,accentColor:GREEN}}/></div>
                  <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Notas</label><input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={S.input} placeholder="Opcional"/></div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:14,alignItems:"center"}}>
                  <button
                    onClick={saveProject}
                    disabled={saving}
                    style={{background:saving?"#9ca3af":GREEN,color:"white",border:"none",borderRadius:8,padding:"9px 24px",fontSize:13,fontWeight:700,cursor:saving?"not-allowed":"pointer",minWidth:120}}>
                    {saving ? "⏳ Guardando..." : editId ? "Guardar cambios" : "Agregar"}
                  </button>
                  <button onClick={()=>{setShowForm(false);setEditId(null);setForm(EMPTY);}} style={{background:"white",color:"#6b7280",border:"1px solid #e5e7eb",borderRadius:8,padding:"9px 16px",fontSize:13,cursor:"pointer"}}>Cancelar</button>
                  {saving && <span style={{fontSize:12,color:GREEN_MID}}>Conectando con Supabase...</span>}
                </div>
              </div>
            )}

            <div style={{background:"white",borderRadius:16,overflow:"hidden",border:`1px solid #c6dfc9`,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:GREEN,color:"white"}}>
                  {["Tarea","Participantes","Categoría","Prioridad","Estado","Avance","Deadline",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 16px",fontSize:11,fontWeight:700,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {filtered.length===0&&<tr><td colSpan={8} style={{textAlign:"center",color:"#9ca3af",padding:32}}>No hay tareas con estos filtros</td></tr>}
                  {filtered.map((p,i)=>(
                    <tr key={p.id} style={{background:i%2===0?"white":"#f4fbf6",borderBottom:"1px solid #e8f5ee"}}>
                      <td style={{padding:"10px 16px"}}>
                        <div style={{fontWeight:600,color:"#1f2937"}}>{p.name}</div>
                        {p.project_id && (() => {
                          const parent = itProjects.find(ip => ip.id === p.project_id);
                          return parent ? <div style={{fontSize:11,color:GREEN_MID,marginTop:2,fontWeight:600}}>📁 {parent.name}</div> : null;
                        })()}
                        {p.subtasks.length>0&&<div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{p.subtasks.filter(s=>s.done).length}/{p.subtasks.length} subtareas</div>}
                        {isOverdue(p.deadline,p.status)&&<span style={{fontSize:11,color:"#ef4444",fontWeight:700}}>⚠️ Vencido</span>}
                      </td>
                      <td style={{padding:"10px 16px"}}><AvatarGroup assignees={p.assignees}/></td>
                      <td style={{padding:"10px 16px"}}><Badge label={p.category} style={CATEGORY_STYLE[p.category]}/></td>
                      <td style={{padding:"10px 16px"}}><Badge label={p.priority} style={PRIORITY_STYLE[p.priority]}/></td>
                      <td style={{padding:"10px 16px"}}><button onClick={()=>cycleStatus(p.id)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Badge label={p.status} style={STATUS_STYLE[p.status]}/></button></td>
                      <td style={{padding:"10px 16px"}}>
                        <div style={{width:80}}>
                          <div style={{fontSize:11,color:GREEN_DARK,marginBottom:2,fontWeight:600}}>{p.progress}%</div>
                          <div style={{background:"#e2e8f0",borderRadius:4,height:6}}><div style={{height:6,borderRadius:4,background:p.progress===100?GREEN_MID:p.progress>=50?"#2563eb":"#f59e0b",width:`${p.progress}%`}}/></div>
                        </div>
                      </td>
                      <td style={{padding:"10px 16px",color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{p.deadline}</td>
                      <td style={{padding:"10px 16px"}}>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={()=>setDetailProject(p)} style={{background:"none",border:"none",color:GREEN,fontSize:12,fontWeight:600,cursor:"pointer"}}>Ver</button>
                          <button onClick={()=>startEdit(p)} style={{background:"none",border:"none",color:"#3b82f6",fontSize:12,fontWeight:600,cursor:"pointer"}}>Editar</button>
                          <button onClick={async()=>{ if(window.confirm("¿Eliminar esta tarea?")) await deleteProject(p.id); }} style={{background:"none",border:"none",color:"#f87171",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <p style={{fontSize:11,color:GREEN_MID,textAlign:"center",marginTop:8}}>☁️ Datos sincronizados con Supabase · Clic en estado para cambiarlo · Clic en "Ver" para detalles</p>
          </>
        )}

        {view==="proyectos" && (
          selectedProject ? (
            <ProjectDashboard
              itProject={selectedProject}
              projects={projects}
              onBack={()=>setSelectedProject(null)}
              onEdit={startEditITProject}
              setDetailProject={setDetailProject}
              cycleStatus={cycleStatus}
            />
          ) : (
            <ProjectsList
              itProjects={itProjects}
              projects={projects}
              onSelect={setSelectedProject}
              onNew={()=>{setProjectForm(EMPTY_PROJECT);setEditProjectId(null);setShowProjectForm(true);}}
              onEdit={startEditITProject}
              onDelete={deleteITProject}
            />
          )
        )}

        {view==="calendario"&&<CalendarView projects={projects}/>}

        {view==="resumen"&&<ResumenJefe projects={projects} stats={stats} catStats={catStats} printReport={printReport}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
